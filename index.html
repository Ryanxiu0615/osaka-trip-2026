<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 · 開發測試版</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDFCF8; --line: #E5E2D9; --primary: #333; --accent: #C88F8F; --sub: #888; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* Header */
        .header { text-align: center; padding: 40px 20px 0; }
        .sub-h { font-size: 10px; letter-spacing: 4px; color: var(--sub); text-transform: uppercase; }
        h1 { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; margin: 10px 0; font-weight: 600; }
        
        /* Weather Widget */
        .weather-section { margin: 15px 20px 25px; padding: 18px; background: rgba(244, 242, 237, 0.4); border-radius: 22px; border: 1px solid rgba(0,0,0,0.03); }
        .weather-title { font-size: 11px; color: var(--sub); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 22px; padding-bottom: 5px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hour-item { text-align: center; min-width: 48px; flex-shrink: 0; }
        .hour-time { font-size: 11px; color: var(--sub); margin-bottom: 8px; }
        .hour-icon { font-size: 1.6rem; margin-bottom: 8px; }
        .hour-temp { font-size: 14px; font-weight: 600; }

        /* Tabs */
        .date-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid #EEE; padding-bottom: 15px; }
        .date-item { text-align: center; font-size: 11px; color: #BBB; cursor: pointer; min-width: 50px; }
        .date-item.active { color: var(--accent); font-weight: 600; }
        .date-item.active span { border-bottom: 2px solid var(--accent); padding-bottom: 4px; }

        /* Timeline Container */
        .container { padding: 0 25px 150px; min-height: 400px; }
        .timeline { position: relative; border-left: 1px solid var(--line); margin-left: 52px; padding-left: 25px; }

        /* Item */
        .item { position: relative; margin-bottom: 45px; cursor: pointer; transition: transform 0.2s; }
        .item:active { transform: scale(0.98); }
        .item-time { position: absolute; left: -77px; font-family: 'Noto Serif TC', serif; font-size: 1.1rem; color: var(--primary); font-weight: 500; text-align: right; width: 45px; }
        .item-time::after { content: '°'; font-size: 10px; vertical-align: super; }
        .item-label { font-size: 9px; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.15rem; font-weight: 600; margin: 0; line-height: 1.4; }
        .stamp { border: 1.2px solid var(--accent); color: var(--accent); padding: 1px 5px; font-size: 9px; border-radius: 3px; transform: rotate(-8deg); display: inline-block; margin-left: 8px; font-weight: bold; vertical-align: middle; }

        /* Modal Area */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; max-height: 85%; border-radius: 28px 28px 0 0; padding: 35px 30px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-handle { width: 40px; height: 5px; background: #EEE; border-radius: 10px; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); }
        .modal-title { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; color: var(--primary); margin-bottom: 20px; border-bottom: 1px solid #F5F5F5; padding-bottom: 15px; }
        .modal-body { font-size: 15px; line-height: 1.8; color: #555; white-space: pre-line; }
        .btn-map { display: block; background: var(--primary); color: white; text-align: center; padding: 15px; border-radius: 14px; text-decoration: none; margin-top: 30px; font-weight: 600; letter-spacing: 1px; }

        /* Placeholder for other days */
        .placeholder { text-align: center; color: #CCC; padding-top: 50px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <div class="sub-h">Testing Phase · Day 1</div>
        <h1>小陳旅行社 大阪五天四夜</h1>
    </div>

    <div class="weather-section">
        <div class="weather-title">
            <span>大阪市 當地即時氣象</span>
            <span style="opacity: 0.5;">Open-Meteo API</span>
        </div>
        <div class="hourly-scroll" id="hourlyWeather">
            <div style="font-size: 12px; color: #AAA;">正在連線氣象衛星...</div>
        </div>
    </div>

    <div class="date-bar">
        <div class="date-item active" onclick="showDay('day1')">4/14<br><span>(二)</span></div>
        <div class="date-item" onclick="alert('目前為測試模式，請先測試 Day 1')">4/15<br><span>(三)</span></div>
        <div class="date-item" onclick="alert('目前為測試模式，請先測試 Day 1')">4/16<br><span>(四)</span></div>
        <div class="date-item" onclick="alert('目前為測試模式，請先測試 Day 1')">4/17<br><span>(五)</span></div>
        <div class="date-item" onclick="alert('目前為測試模式，請先測試 Day 1')">4/18<br><span>(六)</span></div>
    </div>

    <div class="container" id="timelineContainer">
        <div id="day1" class="timeline">
            <div class="item" onclick="openModal('✈️ 航班資訊', '桃園機場 T2 (TPE) ⭢ 關西機場 T1 (KIX)\n🛫 IT210 起飛：06:40 [cite: 6]\n🛬 IT210 抵達：10:24 [cite: 7]', '')">
                <div class="item-time">06:40</div>
                <div class="item-content">
                    <span class="item-label">Departure</span>
                    <h2 class="item-title">出發 IT210</h2>
                </div>
            </div>
            <div class="item" onclick="openModal('🏨 飯店：日居大正一号館', '● 南海地鐵 關西機場 ⭢ 大阪環狀 (52分) 或包車 [cite: 11]\n● 行李請放玄關，務必拍照回傳給房東確認 [cite: 16]', 'https://goo.gl/maps/A6p8i3vF6u65jD6b7')">
                <div class="item-time">12:00</div>
                <div class="item-content">
                    <span class="item-label">Check-in</span>
                    <h2 class="item-title">日居大正一号館</h2>
                </div>
            </div>
            <div class="item" onclick="openModal('🍴 午餐：Shake Shack 漢堡', 'Shake Shack 大丸心齋橋店 (4.3★)\n📍 大丸百貨：agete、寶可夢中心 [cite: 22]\n📍 PARCO：吉伊卡哇land、cosme、無印良品 [cite: 23]\n💡 兩間百貨有空橋互通 [cite: 24]', 'https://app.goo.gl/xS7D')">
                <div class="item-time">14:00</div>
                <div class="item-content">
                    <span class="item-label">Lunch & Shopping</span>
                    <h2 class="item-title">心齋橋市區攻略</h2>
                </div>
            </div>
            <div class="item" onclick="openModal('🍴 晚餐：蔬菜串燒 Narutoya', '已預約 17:30\nYasai Kushimaki Naruto ya Ao\n這是一家位於難波的熱門蔬菜串燒店。 [cite: 26-27]', 'https://app.goo.gl/zL6v7')">
                <div class="item-time">17:30</div>
                <div class="item-content">
                    <span class="item-label">Dinner</span>
                    <h2 class="item-title">蔬菜串燒 <span class="stamp">預約済</span></h2>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-handle"></div>
            <div id="m-title" class="modal-title"></div>
            <div id="m-body" class="modal-body"></div>
            <a id="m-map" href="#" class="btn-map" target="_blank">📍 開啟 Google Maps 導航</a>
        </div>
    </div>

    <script>
        // 天氣 API 串接測試 (大阪座標)
        async function fetchWeather() {
            const scroll = document.getElementById('hourlyWeather');
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&hourly=temperature_2m,weathercode&timezone=Asia%2FTokyo`);
                const data = await response.json();
                scroll.innerHTML = '';
                for (let i = 0; i < 12; i++) {
                    const time = data.hourly.time[i].split('T')[1];
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    const icon = (code <= 3) ? '🌤️' : (code <= 48) ? '☁️' : '🌧️';
                    const item = document.createElement('div');
                    item.className = 'hour-item';
                    item.innerHTML = `<div class="hour-time">${time}</div><div class="hour-icon">${icon}</div><div class="hour-temp">${temp}°</div>`;
                    scroll.appendChild(item);
                }
            } catch (e) { scroll.innerHTML = '氣象讀取失敗'; }
        }

        // 字卡控制
        function openModal(title, body, mapUrl) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-body').innerText = body;
            const btn = document.getElementById('m-map');
            if(mapUrl) { btn.href = mapUrl; btn.style.display = 'block'; } 
            else { btn.style.display = 'none'; }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // 初始化
        fetchWeather();
    </script>
</body>
</html>
