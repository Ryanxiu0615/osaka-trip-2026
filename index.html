<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 · 預約管理版</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDFCF8; --line: #E5E2D9; --primary: #333; --accent: #C88F8F; --sub: #888; --ticket-bg: #FCFBF7; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        /* Header & Weather */
        .header { text-align: center; padding: 40px 20px 0; }
        h1 { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; margin: 10px 0; font-weight: 600; }
        .weather-section { margin: 15px 20px 25px; padding: 18px; background: rgba(244, 242, 237, 0.4); border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 5px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hour-item { text-align: center; min-width: 45px; flex-shrink: 0; }
        
        /* Timeline */
        .container { padding: 0 25px 150px; }
        .timeline { position: relative; border-left: 1px solid var(--line); margin-left: 55px; padding-left: 25px; }
        .item { position: relative; margin-bottom: 45px; cursor: pointer; }
        .item-time { position: absolute; left: -80px; font-family: 'Noto Serif TC', serif; font-size: 1.1rem; width: 50px; text-align: right; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 600; margin: 0; }
        .item-label { font-size: 9px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .stamp { border: 1.2px solid var(--accent); color: var(--accent); padding: 1px 5px; font-size: 9px; border-radius: 3px; transform: rotate(-8deg); display: inline-block; margin-left: 8px; font-weight: bold; }

        /* Modal & Ticket Style */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; max-height: 85%; border-radius: 24px 24px 0 0; padding: 35px 25px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-family: 'Noto Serif TC', serif; font-size: 1.3rem; border-bottom: 1px solid #EEE; padding-bottom: 12px; margin-bottom: 15px; }
        
        /* 預約票券區塊 */
        .booking-card { background: var(--ticket-bg); border: 1px dashed var(--line); border-radius: 12px; padding: 15px; margin: 15px 0; position: relative; }
        .booking-card::before, .booking-card::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 50%; margin-top: -10px; border: 1px solid rgba(0,0,0,0.03); }
        .booking-card::before { left: -11px; } .booking-card::after { right: -11px; }
        .booking-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .booking-label { color: var(--sub); }
        .booking-value { font-weight: 600; color: var(--primary); }

        .modal-body { font-size: 14px; line-height: 1.8; color: #555; white-space: pre-line; }
        .btn-map { display: block; background: var(--primary); color: white; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; margin-top: 25px; font-weight: 600; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #CCC; }
    </style>
</head>
<body>

    <div class="header"><h1>小陳旅行社 · 預約管理測試</h1></div>

    <div class="weather-section">
        <div class="hourly-scroll" id="hourlyWeather">讀取中...</div>
    </div>

    <div class="date-bar" style="display:flex; justify-content:center; gap:10px; margin-bottom:20px; border-bottom:1px solid #EEE; padding-bottom:15px;">
        <div class="date-item active" style="text-align:center; font-size:11px; color:var(--accent); font-weight:600;">4/14<br><span>(二)</span></div>
        <div class="date-item" style="text-align:center; font-size:11px; color:#BBB;" onclick="alert('測試版僅開放 Day 1 與 Day 2 部分功能')">4/15<br><span>(三)</span></div>
    </div>

    <div class="container">
        <div class="timeline">
            <div class="item" onclick="openModal('民宿入住', '日居大正一号館\n請確保行李整齊擺放，並拍照回傳。', 'https://goo.gl/maps/A6p8i3vF6u65jD6b7', null)">
                <div class="item-time">12:00</div>
                <div class="item-content"><span class="item-label">Check-in</span><h2 class="item-title">民宿入住指引</h2></div>
            </div>

            <div class="item" onclick="openModal('蔬菜串燒 Naruto ya', 'Yasai Kushimaki Naruto ya Ao [cite: 27]\n主打清爽不油膩的蔬菜捲，適合6人女孩團聚餐。', 'https://app.goo.gl/zL6v7', {time: '17:30', code: 'RESERVED-0414', people: '6位 大人'})">
                <div class="item-time">17:30</div>
                <div class="item-content">
                    <span class="item-label">Dinner</span>
                    <h2 class="item-title">蔬菜串燒 <span class="stamp">預約済</span></h2>
                </div>
            </div>

            <div class="item" onclick="openModal('USJ 瑪利歐賽車預約', '咚奇剛瘋狂礦車已預約完成 [cite: 56]。', '', {time: '11:00-11:30', code: 'USJ-NINTENDO-889', people: '6人 已付費'})">
                <div class="item-time">11:00</div>
                <div class="item-content">
                    <span class="item-label">USJ Event</span>
                    <h2 class="item-title">USJ 咚奇剛預約 <span class="stamp">預約済</span></h2>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">×</span>
            <div id="m-title" class="modal-title"></div>
            
            <div id="booking-section" class="booking-card" style="display:none;">
                <div class="booking-row"><span class="booking-label">預約時間</span><span id="b-time" class="booking-value"></span></div>
                <div class="booking-row"><span class="booking-label">確認代碼</span><span id="b-code" class="booking-value" style="color:var(--accent);"></span></div>
                <div class="booking-row"><span class="booking-label">預約人數</span><span id="b-people" class="booking-value"></span></div>
            </div>

            <div id="m-body" class="modal-body"></div>
            <a id="m-map" href="#" class="btn-map" target="_blank">📍 開啟 Google Maps</a>
        </div>
    </div>

    <script>
        async function fetchWeather() {
            const scroll = document.getElementById('hourlyWeather');
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&hourly=temperature_2m,weathercode&timezone=Asia%2FTokyo`);
                const data = await res.json();
                scroll.innerHTML = '';
                for (let i = 0; i < 12; i++) {
                    const t = data.hourly.time[i].split('T')[1];
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    const icon = code <= 3 ? '☀️' : code <= 48 ? '☁️' : '🌧️';
                    scroll.innerHTML += `<div class="hour-item"><div class="hour-time">${t}</div><div class="hour-icon">${icon}</div><div class="hour-temp">${temp}°</div></div>`;
                }
            } catch (e) { scroll.innerHTML = '氣象讀取失敗'; }
        }

        function openModal(t, b, mapUrl, booking) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-body').innerText = b;
            
            const bookingSec = document.getElementById('booking-section');
            if (booking) {
                bookingSec.style.display = 'block';
                document.getElementById('b-time').innerText = booking.time;
                document.getElementById('b-code').innerText = booking.code;
                document.getElementById('b-people').innerText = booking.people;
            } else {
                bookingSec.style.display = 'none';
            }

            const btn = document.getElementById('m-map');
            if(mapUrl) { btn.href = mapUrl; btn.style.display = 'block'; } else { btn.style.display = 'none'; }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        fetchWeather();
    </script>
</body>
</html>
