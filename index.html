<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 · 大阪手帖</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9F8F6; --primary: #333; --accent: #C88F8F; --sub: #999; --line: #EAE8E4; --box-bg: #FCFBFA; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        /* 基礎排版 (同之前妳喜歡的版本) */
        .app-header { text-align: center; padding: 30px 20px 0; background: var(--bg); }
        .header-title { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; font-weight: 600; }
        .weather-scroll { padding: 15px 25px; display: flex; overflow-x: auto; gap: 20px; scrollbar-width: none; }
        .weather-scroll::-webkit-scrollbar { display: none; }
        .container { padding: 30px 20px 180px; }
        .timeline { position: relative; border-left: 1px solid var(--line); margin-left: 65px; }
        .item { position: relative; padding-left: 25px; margin-bottom: 50px; cursor: pointer; }
        .item-time { position: absolute; left: -85px; top: 0; font-family: 'Noto Serif TC', serif; font-size: 1.3rem; }
        .item-time::after { content: '°'; font-size: 12px; vertical-align: super; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.25rem; font-weight: 600; margin-bottom: 5px; }
        .stamp { border: 1.5px solid var(--accent); color: var(--accent); padding: 1px 5px; font-size: 9px; border-radius: 4px; transform: rotate(-10deg); display: inline-block; margin-left: 10px; font-weight: bold; }

        /* 導遊字卡 Modal (復刻截圖設計) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: flex-end; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 100%; max-height: 90%; border-radius: 30px 30px 0 0; padding: 30px 20px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 26px; color: #CCC; }

        /* 頂部預約區 */
        .ticket-header { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .ticket-label { border: 1px solid var(--accent); color: var(--accent); padding: 2px 8px; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .ticket-time { color: var(--sub); font-size: 13px; font-family: 'Noto Serif TC', serif; }

        /* 指差會話/菜單 */
        .section-title { font-size: 11px; color: var(--sub); letter-spacing: 1px; margin: 25px 0 12px; display: flex; align-items: center; gap: 8px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .menu-item { background: var(--box-bg); border: 1px solid #EEE; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .menu-zh { font-size: 15px; font-weight: 500; }
        .menu-jp { font-size: 13px; color: var(--sub); }

        /* 導遊補充故事 */
        .story-box { border-left: 1px solid #EEE; padding-left: 20px; margin-left: 5px; }
        .story-item { position: relative; margin-bottom: 25px; font-size: 14px; color: #555; line-height: 1.8; }
        .story-item::before { content: ''; position: absolute; left: -24px; top: 10px; width: 8px; height: 1px; background: #EEE; }
        .story-tag { font-weight: 600; color: #333; }

        /* 底部焦點卡片 */
        .focus-card { position: fixed; bottom: 30px; left: 15px; right: 15px; background: white; border-radius: 20px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; align-items: center; z-index: 2000; border: 1px solid #F0F0F0; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-top">FAMILY TRIP</div>
        <div class="header-title">大阪旅行 <span style="font-size: 12px; color: var(--sub); border: 1px solid #DDD; padding: 2px 8px; border-radius: 20px; font-weight: normal;">2026</span></div>
    </div>

    <div class="weather-scroll" id="hourlyWeather">讀取中...</div>

    <div class="container">
        <div class="timeline">
            <div class="item" onclick="showGuide('shopping')">
                <div class="item-time">14:00</div>
                <div class="item-content">
                    <span style="font-size:9px; color:var(--sub);">🛍️ SHOPPING</span>
                    <h2 class="item-title">大丸 & PARCO 攻略</h2>
                    <p style="font-size:12px; color:#999;">百貨空橋、動漫天堂與美妝必買...</p>
                </div>
            </div>

            <div class="item" onclick="showGuide('dinner')">
                <div class="item-time">17:30</div>
                <div class="item-content">
                    <span style="font-size:9px; color:var(--sub);">🍴 FOOD</span>
                    <h2 class="item-title">蔬菜串燒 <span class="stamp">預約済</span></h2>
                    <p style="font-size:12px; color:#999;">預約完成 · 6位大人</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">×</span>
            
            <div id="m-ticket" class="ticket-header" style="display:none;">
                <div class="ticket-label">FOOD</div>
                <div class="ticket-time">🕒 <span id="m-res-time"></span></div>
            </div>

            <h2 id="m-title" style="font-family:'Noto Serif TC', serif; font-size:1.5rem; margin:10px 0;"></h2>
            <p id="m-address" style="font-size:12px; color:var(--sub); margin-bottom:20px;"></p>

            <div id="m-menu-section">
                <div class="section-title">文 指差し会話 (POINT & SPEAK)</div>
                <div id="m-menu-grid" class="menu-grid"></div>
            </div>

            <div class="section-title">ⓘ 關於此處 (ABOUT)</div>
            <div class="story-box" id="m-story"></div>

            <a id="m-map" href="#" style="display:block; background:#333; color:white; text-align:center; padding:18px; border-radius:15px; text-decoration:none; margin-top:30px; font-weight:600;">📍 開啟 Google Maps 導航</a>
        </div>
    </div>

    <script>
        const guideData = {
            shopping: {
                title: "大丸 & PARCO 購物攻略",
                address: "大阪市中央區心齋橋筋1-7-1",
                resTime: null,
                menu: [
                    { zh: "吉伊卡哇Land (6F)", jp: "ちいかわらんど" },
                    { zh: "寶可夢中心 (9F)", jp: "ポケモンセンター" },
                    { zh: "3Coins 雜貨 (B1F)", jp: "スリーコインズ" }
                ],
                stories: [
                    { tag: "動漫控必看", text: "PARCO 6樓是動漫天堂，除了吉伊卡哇，還有 CAPCOM 和刀劍亂舞。記得跟巨大的瑪利歐合照！" },
                    { tag: "逛街秘訣", text: "大丸百貨和 PARCO 在 2 樓到 10 樓都有空橋互通，不用下樓到街道，可以一路逛到底。" }
                ],
                map: "https://app.goo.gl/xS7D"
            },
            dinner: {
                title: "蔬菜串燒 Naruto ya",
                address: "難波千日前區",
                resTime: "17:30 (已預約 6位)",
                menu: [
                    { zh: "生菜豬肉捲 (必點)", jp: "レタス豚巻き" },
                    { zh: "半熟蛋捲肉", jp: "半熟卵の肉巻き" },
                    { zh: "酪梨豬肉捲", jp: "アボカド豚巻き" }
                ],
                stories: [
                    { tag: "導遊真心推", text: "這家店主打清爽不油膩的蔬菜捲。生菜捲豬肉咬下去會有清脆的聲音，非常適合姊妹聚餐拍照。" },
                    { tag: "預約提醒", text: "現場候位通常要一小時以上，我們已經預約好 17:30，請旅伴準時在門口集合喔！" }
                ],
                map: "https://app.goo.gl/zL6v7"
            }
        };

        function showGuide(key) {
            const data = guideData[key];
            document.getElementById('m-title').innerText = data.title;
            document.getElementById('m-address').innerText = "📍 " + data.address;
            
            // 預約區
            const ticket = document.getElementById('m-ticket');
            if(data.resTime) {
                ticket.style.display = 'flex';
                document.getElementById('m-res-time').innerText = data.resTime;
            } else { ticket.style.display = 'none'; }

            // 菜單區
            const grid = document.getElementById('m-menu-grid');
            grid.innerHTML = data.menu.map(i => `<div class="menu-item"><span class="menu-zh">${i.zh}</span><span class="menu-jp">${i.jp}</span></div>`).join('');

            // 故事區
            const story = document.getElementById('m-story');
            story.innerHTML = data.stories.map(s => `<div class="story-item"><span class="story-tag">【${s.tag}】</span>${s.text}</div>`).join('');

            document.getElementById('m-map').href = data.map;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // 天氣 API (略，同之前版本)
        async function fetchWeather() {
            const scroll = document.getElementById('hourlyWeather');
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&hourly=temperature_2m,weathercode&timezone=Asia%2FTokyo`);
            const data = await res.json();
            scroll.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const t = data.hourly.time[i].split('T')[1];
                const temp = Math.round(data.hourly.temperature_2m[i]);
                const code = data.hourly.weathercode[i];
                const icon = code <= 3 ? '☀️' : '☁️';
                scroll.innerHTML += `<div style="text-align:center; min-width:45px;"><div style="font-size:10px; color:#999;">${t}</div><div style="font-size:1.2rem; margin:5px 0;">${icon}</div><div style="font-size:13px; font-weight:600;">${temp}°</div></div>`;
            }
        }
        fetchWeather();
    </script>
</body>
</html>
