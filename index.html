<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 · 大阪手帖</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #F9F8F6; /* 經典米白手帳色 */
            --primary: #333; 
            --accent: #C88F8F; 
            --sub: #999; 
            --line: #EAE8E4;
        }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        /* 頂部標題 */
        .app-header { text-align: center; padding: 30px 20px 0; background: var(--bg); }
        .header-top { font-size: 10px; letter-spacing: 3px; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; }
        .header-title { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header-year { font-size: 12px; color: var(--sub); border: 1px solid #DDD; padding: 2px 8px; border-radius: 20px; font-weight: normal; }

        /* 天氣橫向捲動 */
        .weather-scroll { padding: 15px 25px; display: flex; overflow-x: auto; gap: 20px; scrollbar-width: none; background: var(--bg); }
        .weather-scroll::-webkit-scrollbar { display: none; }
        .w-item { text-align: center; min-width: 45px; }
        .w-time { font-size: 10px; color: var(--sub); margin-bottom: 5px; }
        .w-temp { font-size: 13px; font-weight: 500; }

        /* 日期選擇 */
        .date-bar { display: flex; justify-content: center; gap: 15px; padding: 10px 0 20px; border-bottom: 1px solid #EEE; }
        .date-item { text-align: center; font-size: 11px; color: #CCC; min-width: 45px; }
        .date-item.active { color: var(--primary); font-weight: 600; position: relative; }
        .date-item.active::after { content: ''; position: absolute; bottom: -5px; left: 50%; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; transform: translateX(-50%); }

        /* 行程容器 */
        .container { padding: 30px 20px 180px; }
        .timeline { position: relative; border-left: 1px solid var(--line); margin-left: 65px; }
        
        /* 行程項目 */
        .item { position: relative; padding-left: 25px; margin-bottom: 50px; cursor: pointer; }
        .item-time { position: absolute; left: -85px; top: 0; font-family: 'Noto Serif TC', serif; font-size: 1.3rem; color: var(--primary); }
        .item-time::after { content: '°'; font-size: 12px; vertical-align: super; margin-left: 2px; color: var(--sub); }
        
        .item-content { margin-top: 4px; }
        .item-label { font-size: 9px; color: var(--sub); letter-spacing: 1px; display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.25rem; font-weight: 600; margin-bottom: 10px; color: #222; }
        .item-desc { font-size: 13px; color: #888; line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 彩色標籤 (保留妳喜歡的設計) */
        .chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-right: 5px; margin-top: 5px; font-weight: 500; }
        .chip-anime { background: #FFE5E5; color: #D98C8C; }
        .chip-beauty { background: #E5F0FF; color: #7096D1; }
        .chip-food { background: #FFF4E5; color: #D4A373; }

        /* 預約印章 */
        .stamp { border: 1.5px solid #C88F8F; color: #C88F8F; padding: 1px 5px; font-size: 9px; border-radius: 4px; transform: rotate(-10deg); display: inline-block; margin-left: 10px; font-weight: bold; }

        /* 底部焦點卡片 (截圖精華) */
        .focus-card { position: fixed; bottom: 30px; left: 15px; right: 15px; background: white; border-radius: 20px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; align-items: center; z-index: 2000; border: 1px solid #F0F0F0; }
        .focus-main { flex: 1; border-right: 1px solid #EEE; padding-right: 15px; }
        .focus-time { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; display: flex; align-items: center; gap: 8px; }
        .focus-tag { background: #F5F5F5; font-size: 10px; padding: 2px 6px; border-radius: 4px; color: #999; font-weight: normal; }
        .focus-title { font-size: 14px; font-weight: 600; margin-top: 5px; }
        .focus-next { flex: 0 0 80px; text-align: center; padding-left: 10px; color: var(--sub); }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; z-index: 3000; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-height: 85%; border-radius: 30px 30px 0 0; padding: 40px 25px; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-top">FAMILY TRIP</div>
        <div class="header-title">大阪旅行 <span class="header-year">2026</span></div>
    </div>

    <div class="weather-scroll" id="hourlyWeather">讀取中...</div>

    <div class="date-bar">
        <div class="date-item active">SAT<br>14</div>
        <div class="date-item">SUN<br>15</div>
        <div class="date-item">MON<br>16</div>
        <div class="date-item">TUE<br>17</div>
        <div class="date-item">WED<br>18</div>
    </div>

    <div class="container">
        <div class="timeline">
            <div class="item" onclick="openModal('✈️ 航班資訊 (IT210)', '桃園機場 T2 (TPE) ⭢ 關西機場 T1 (KIX)\n起飛：06:40 / 抵達：10:24', '')">
                <div class="item-time">06:40</div>
                <div class="item-content">
                    <span class="item-label">✈️ FLIGHT</span>
                    <h2 class="item-title">出發 (IT210)</h2>
                    <p class="item-desc">搭乘虎航，開啟大阪女子購物之旅...</p>
                </div>
            </div>

            <div class="item" onclick="openModal('🏨 日居大正一号館', '● 行李請放玄關，務必拍照回傳房東。\n● 6人團體入住，注意空間利用。', 'https://goo.gl/maps/A6p8i3vF6u65jD6b7')">
                <div class="item-time">12:00</div>
                <div class="item-content">
                    <span class="item-label">🏠 ACCOMMODATION</span>
                    <h2 class="item-title">日居大正一号館</h2>
                    <p class="item-desc">大正站步行抵達，拍照確認入住。</p>
                </div>
            </div>

            <div class="item" onclick="openModal('🛍️ 心齋橋購物攻略', '● 大丸百貨 9F：寶可夢中心\n● PARCO 6F：吉伊卡哇Land、CAPCOM\n● 其他：@cosme、3Coins、日牌服飾', 'https://app.goo.gl/xS7D')">
                <div class="item-time">14:00</div>
                <div class="item-content">
                    <span class="item-label">🛍️ SHOPPING</span>
                    <h2 class="item-title">大丸 & PARCO 攻略</h2>
                    <div class="chip chip-anime">吉伊卡哇</div><div class="chip chip-anime">寶可夢中心</div><div class="chip chip-beauty">@cosme</div>
                </div>
            </div>

            <div class="item" onclick="openModal('🍴 晚餐預約', '蔬菜串燒 Naruto ya\n已預約 17:30，6人座。', 'https://app.goo.gl/zL6v7')">
                <div class="item-time">17:30</div>
                <div class="item-content">
                    <span class="item-label">🍴 FOOD</span>
                    <h2 class="item-title">蔬菜串燒 <span class="stamp">預約済</span></h2>
                    <div class="chip chip-food">章魚燒</div><div class="chip chip-food">烤糰子</div>
                </div>
            </div>
        </div>
    </div>

    <div class="focus-card">
        <div class="focus-main">
            <div class="focus-time">17:30 <span class="focus-tag">行程預覽</span></div>
            <div class="focus-title">蔬菜串燒 Naruto ya</div>
        </div>
        <div class="focus-next">
            <div style="font-size:10px;">下個時間</div>
            <div style="font-size:14px; color:#333; font-weight:600;">19:00</div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-title" style="font-family:'Noto Serif TC', serif; font-size:1.4rem; border-bottom:1px solid #EEE; padding-bottom:15px; margin-bottom:20px;"></div>
            <div id="m-body" style="font-size:15px; line-height:1.8; white-space:pre-line; color:#555;"></div>
            <a id="m-map" href="#" style="display:block; background:#333; color:white; text-align:center; padding:16px; border-radius:15px; text-decoration:none; margin-top:30px; font-weight:600;">📍 開啟 Google Maps</a>
        </div>
    </div>

    <script>
        async function fetchWeather() {
            const scroll = document.getElementById('hourlyWeather');
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&hourly=temperature_2m,weathercode&timezone=Asia%2FTokyo`);
                const data = await res.json();
                scroll.innerHTML = '';
                for (let i = 0; i < 12; i++) {
                    const t = data.hourly.time[i].split('T')[1];
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    const icon = code <= 3 ? '☀️' : code <= 48 ? '☁️' : '🌧️';
                    scroll.innerHTML += `<div class="w-item"><div class="w-time">${t}</div><div style="font-size:1.2rem; margin:5px 0;">${icon}</div><div class="w-temp">${temp}°</div></div>`;
                }
            } catch (e) { scroll.innerHTML = '氣象加載中...'; }
        }
        function openModal(t, b, m) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-body').innerText = b;
            const btn = document.getElementById('m-map');
            if(m) { btn.href = m; btn.style.display = 'block'; } else { btn.style.display = 'none'; }
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        fetchWeather();
    </script>
</body>
</html>
