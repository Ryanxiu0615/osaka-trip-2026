<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 大阪五天四夜</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDFCF8; --line: #E5E2D9; --primary: #333; --accent: #C88F8F; --sub: #888; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        /* Header */
        .header { text-align: center; padding: 30px 20px 0; }
        .sub-h { font-size: 10px; letter-spacing: 4px; color: var(--sub); text-transform: uppercase; }
        h1 { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; margin: 10px 0; font-weight: 600; }
        
        /* 橫向天氣捲動區塊 */
        .weather-section { margin: 10px 20px 20px; padding: 15px; background: rgba(244, 242, 237, 0.5); border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); }
        .weather-title { font-size: 12px; color: var(--sub); margin-bottom: 12px; display: flex; justify-content: space-between; }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 10px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hour-item { text-align: center; min-width: 45px; flex-shrink: 0; }
        .hour-time { font-size: 11px; color: var(--sub); margin-bottom: 8px; }
        .hour-icon { font-size: 1.5rem; margin-bottom: 8px; }
        .hour-temp { font-size: 14px; font-weight: 600; }

        /* Tabs */
        .date-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #EEE; padding-bottom: 15px; }
        .date-item { text-align: center; font-size: 11px; color: #BBB; cursor: pointer; min-width: 50px; }
        .date-item.active { color: var(--accent); font-weight: 600; }
        .date-item.active span { border-bottom: 2px solid var(--accent); padding-bottom: 4px; }

        /* Timeline */
        .container { padding: 0 25px 120px; }
        .timeline { position: relative; display: none; }
        .timeline.active { display: block; }
        .timeline::before { content: ''; position: absolute; left: 52px; top: 0; bottom: 0; width: 1px; background: var(--line); }
        .item { position: relative; padding-left: 75px; margin-bottom: 40px; cursor: pointer; }
        .item-time { position: absolute; left: 0; font-family: 'Noto Serif TC', serif; font-size: 1.1rem; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 600; }
        .item-label { font-size: 9px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; display: block; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 85%; max-height: 80%; border-radius: 24px; padding: 30px; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #DDD; }
        .modal-body { font-size: 14px; line-height: 1.8; color: #555; white-space: pre-line; }
        .btn-map { display: block; background: var(--primary); color: white; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="sub-h">Travel Guide · 2026</div>
        <h1>小陳旅行社 大阪五天四夜</h1>
    </div>

    <div class="weather-section">
        <div class="weather-title">
            <span id="location-name">大阪市 當地即時天氣資訊</span>
            <span>Open-Meteo</span>
        </div>
        <div class="hourly-scroll" id="hourlyWeather">
            <div style="color:#CCC; font-size:12px;">正在讀取即時天氣...</div>
        </div>
    </div>

    <div class="date-bar" id="dateBar">
        <div class="date-item active" onclick="switchDay('day1', 34.69, 135.50)">4/14<br><span>(二)</span></div>
        <div class="date-item" onclick="switchDay('day2', 34.69, 135.50)">4/15<br><span>(三)</span></div>
        <div class="date-item" onclick="switchDay('day3', 35.01, 135.76)">4/16<br><span>(四)</span></div>
        <div class="date-item" onclick="switchDay('day4', 34.69, 135.50)">4/17<br><span>(五)</span></div>
        <div class="date-item" onclick="switchDay('day5', 34.69, 135.50)">4/18<br><span>(六)</span></div>
    </div>

    <div class="container" id="timelineContainer"></div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="m-title" style="font-family:'Noto Serif TC', serif; font-size:1.3rem; border-bottom:1px solid #EEE; padding-bottom:10px;"></div>
            <div id="m-body" class="modal-body" style="margin-top:15px;"></div>
            <a id="m-map" href="#" class="btn-map" target="_blank">📍 開啟 Google Maps 導航</a>
        </div>
    </div>

    <script>
        // 行程資料 (保持你的全文字內容)
        const itinerary = {
            day1: [
                { time: '06:40', label: 'FLIGHT', title: '出發 IT210', desc: '桃園機場 T2 (TPE) ⭢ 關西機場 T1 (KIX)\n🛫 起飛：06:40\n🛬 抵達：10:24', map: '' },
                { time: '12:00', label: 'HOTEL', title: '日居大正一号館', desc: '🚇 南海地鐵 關西機場⭢大阪環狀 (52分)\n⚠️ 行李放玄關，務必拍照回傳給房東。', map: 'https://goo.gl/maps/A6p8i3vF6u65jD6b7' },
                { time: '17:30', label: 'DINNER', title: '蔬菜串燒 Naruto ya', desc: '已預約 17:30。Yasai Kushimaki Naruto ya Ao。', map: 'https://app.goo.gl/zL6v7' }
            ],
            day2: [
                { time: '09:00', label: 'USJ', title: '日本環球影城', desc: '⭐️ 重點：瑪莉歐賽車、禁忌之旅、飛天翼龍、咒術迴戰。\n🍴 必吃：賽利亞納食堂貓飯、奶油啤酒。\n🛍️ 必買：無敵星星爆米花桶。', map: 'https://app.goo.gl/tU5J' }
            ],
            day3: [
                { time: '11:00', label: 'LUNCH', title: '敘敘苑 燒肉', desc: 'JR京都伊勢丹 7F，已預約。', map: 'https://app.goo.gl/jjo' },
                { time: '14:00', label: 'SHRINE', title: '下鴨神社', desc: '必買：蕾絲御守、媛守。注意京都巴士禮儀。', map: 'maps.google.com' }
            ],
            day4: [
                { time: '09:00', label: 'MARKET', title: '木津市場', desc: '品嚐新鮮海鮮。', map: '' },
                { time: '18:00', label: 'DINNER', title: '天星 (天婦羅)', desc: '⚠️ 禁止穿短褲拖鞋。', map: 'https://app.goo.gl/tsb' }
            ],
            day5: [
                { time: '13:00', label: 'OUTLET', title: '臨空城 OUTLET', desc: '包車前往，最後血拼。', map: 'https://app.goo.gl/rku' }
            ]
        };

        // 氣象 API 串接程式
        async function fetchWeather(lat, lon) {
            const scroll = document.getElementById('hourlyWeather');
            scroll.innerHTML = '<div style="color:#CCC; font-size:12px;">更新天氣中...</div>';
            
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode&timezone=Asia%2FTokyo`);
                const data = await response.json();
                
                scroll.innerHTML = '';
                // 抓取接下來 12 小時的數據
                for (let i = 0; i < 12; i++) {
                    const time = data.hourly.time[i].split('T')[1];
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    const icon = getWeatherIcon(code);
                    
                    const item = document.createElement('div');
                    item.className = 'hour-item';
                    item.innerHTML = `
                        <div class="hour-time">${time}</div>
                        <div class="hour-icon">${icon}</div>
                        <div class="hour-temp">${temp}°</div>
                    `;
                    scroll.appendChild(item);
                }
            } catch (e) {
                scroll.innerHTML = '無法取得即時天氣';
            }
        }

        function getWeatherIcon(code) {
            if (code <= 1) return '☀️';
            if (code <= 3) return '🌤️';
            if (code <= 48) return '☁️';
            if (code <= 67) return '🌧️';
            return '❄️';
        }

        function switchDay(dayId, lat, lon) {
            renderTimeline(dayId);
            fetchWeather(lat, lon);
            document.getElementById('location-name').innerText = (lat === 35.01 ? '京都市' : '大阪市') + ' 當地即時天氣資訊';
            document.querySelectorAll('.date-item').forEach(d => d.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function renderTimeline(dayId) {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = `<div id="${dayId}" class="timeline active"></div>`;
            const timelineDiv = container.firstChild;
            itinerary[dayId].forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.onclick = () => openModal(item.title, item.desc, item.map);
                itemDiv.innerHTML = `<div class="item-time">${item.time}</div><div class="item-content"><span class="item-label">${item.label}</span><h2 class="item-title">${item.title}</h2></div>`;
                timelineDiv.appendChild(itemDiv);
            });
        }

        function openModal(t, b, m) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-body').innerText = b;
            const btn = document.getElementById('m-map');
            if(m) { btn.href = m; btn.style.display = 'block'; } else { btn.style.display = 'none'; }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // 初始化
        renderTimeline('day1');
        fetchWeather(34.69, 135.50);
    </script>
</body>
</html>
