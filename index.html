<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 · 大阪手帖</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #F5F2ED; /* 暖米色背景 */
            --card: #FFFFFF;
            --primary: #3D3D3D; 
            --accent: #D98C8C; /* 暖粉色 */
            --sub: #8C8276; 
        }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        /* 頂部形象區 */
        .hero-banner { width: 100%; height: 220px; position: relative; overflow: hidden; background: #E5E2D9; }
        .hero-banner img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
        .hero-overlay { position: absolute; bottom: 20px; left: 25px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .hero-overlay span { font-size: 12px; letter-spacing: 3px; opacity: 0.9; }
        .hero-overlay h1 { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; margin: 5px 0 0 0; }

        /* 天氣區塊 */
        .weather-widget { margin: -30px 20px 20px; padding: 20px; background: var(--card); border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); position: relative; z-index: 10; }
        .weather-title { font-size: 11px; color: var(--sub); margin-bottom: 12px; display: flex; justify-content: space-between; }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 5px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hour-item { text-align: center; min-width: 45px; flex-shrink: 0; }
        .hour-time { font-size: 10px; color: var(--sub); margin-bottom: 6px; }
        .hour-temp { font-size: 14px; font-weight: 600; }

        /* 行程容器 */
        .container { padding: 10px 20px 150px; }
        .timeline { position: relative; border-left: 2px solid #E5E2D9; margin-left: 60px; padding-left: 25px; }
        
        /* 行程卡片 */
        .item { position: relative; margin-bottom: 30px; background: var(--card); padding: 22px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.02); cursor: pointer; border: 1px solid rgba(255,255,255,0.5); }
        .item-time { position: absolute; left: -105px; font-family: 'Noto Serif TC', serif; font-size: 1.15rem; color: var(--primary); top: 22px; width: 65px; text-align: right; }
        .item-time::after { content: '°'; font-size: 10px; vertical-align: super; }
        .item-label { font-size: 10px; color: var(--accent); font-weight: 700; margin-bottom: 6px; display: block; letter-spacing: 1px; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 600; line-height: 1.4; }
        
        /* 標籤 */
        .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; margin-right: 6px; margin-top: 8px; background: #F8F4F0; color: #9B8E7E; }

        /* 彈窗 Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: flex-end; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 100%; max-height: 85%; border-radius: 32px 32px 0 0; padding: 40px 25px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #DDD; }
        .modal-title { font-family: 'Noto Serif TC', serif; font-size: 1.45rem; border-bottom: 1px solid #F0F0F0; padding-bottom: 15px; margin-bottom: 20px; }
        
        /* 預約票券 */
        .ticket { background: #FAF9F6; border: 1.5px dashed #E0DDD5; border-radius: 16px; padding: 20px; margin: 20px 0; }
        .ticket-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .ticket-val { font-weight: 600; color: var(--accent); }

        .btn-map { display: block; background: var(--primary); color: white; text-align: center; padding: 18px; border-radius: 16px; text-decoration: none; margin-top: 30px; font-weight: 600; }
    </style>
</head>
