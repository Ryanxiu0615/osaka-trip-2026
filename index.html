<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 · 大阪手帖</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9F8F6; --primary: #333; --accent: #C88F8F; --sub: #999; --line: #EAE8E4; --box-bg: #FCFBFA; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        /* 標題區 */
        .app-header { text-align: center; padding: 35px 20px 0; background: var(--bg); }
        .header-top { font-size: 10px; letter-spacing: 3px; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; }
        .header-title { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; }
        .header-year { font-size: 11px; color: var(--sub); border: 1px solid #DDD; padding: 1px 7px; border-radius: 20px; font-weight: normal; }

        /* 天氣條 */
        .weather-scroll { padding: 15px 25px; display: flex; overflow-x: auto; gap: 20px; scrollbar-width: none; background: var(--bg); }
        .weather-scroll::-webkit-scrollbar { display: none; }
        .w-item { text-align: center; min-width: 45px; }

        /* 日期選擇 */
        .date-bar { display: flex; justify-content: center; gap: 15px; padding: 10px 0 20px; border-bottom: 1px solid #EEE; }
        .date-item { text-align: center; font-size: 11px; color: #CCC; min-width: 45px; }
        .date-item.active { color: var(--primary); font-weight: 600; position: relative; }
        .date-item.active::after { content: ''; position: absolute; bottom: -5px; left: 50%; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; transform: translateX(-50%); }

        /* 時間軸項目 */
        .container { padding: 30px 20px 180px; }
        .timeline { position: relative; border-left: 1px solid var(--line); margin-left: 65px; }
        .item { position: relative; padding-left: 25px; margin-bottom: 50px; cursor: pointer; }
        .item-time { position: absolute; left: -85px; top: 0; font-family: 'Noto Serif TC', serif; font-size: 1.3rem; color: var(--primary); }
        .item-time::after { content: '°'; font-size: 12px; vertical-align: super; margin-left: 2px; color: var(--sub); }
        .item-label { font-size: 9px; color: var(--sub); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; display: block; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 600; }
        .stamp { border: 1.5px solid var(--accent); color: var(--accent); padding: 1px 5px; font-size: 9px; border-radius: 4px; transform: rotate(-10deg); display: inline-block; margin-left: 10px; font-weight: bold; }

        /* 導遊 Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: flex-end; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 100%; max-height: 90%; border-radius: 30px 30px 0 0; padding: 35px 25px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 26px; color: #CCC; cursor: pointer; }
        
        /* 導遊內容區 */
        .blogger-tip { background: #FFF9F9; border-radius: 12px; padding: 15px; border-left: 4px solid var(--accent); margin: 15px 0; font-size: 13px; line-height: 1.6; color: #555; }
        .blogger-tip b { color: var(--accent); font-weight: 700; }
        .info-item { background: var(--box-bg); border: 1px solid #F0F0F0; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .info-main { font-size: 14px; font-weight: 600; color: #333; }
        .info-sub { font-size: 11px; color: var(--sub); margin-top: 3px; }
        .btn-map { display: block; background: #333; color: white; text-align: center; padding: 18px; border-radius: 15px; text-decoration: none; margin-top: 25px; font-weight: 600; }

        /* 底部焦點卡片 */
        .focus-card { position: fixed; bottom: 30px; left: 15px; right: 15px; background: white; border-radius: 20px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; align-items: center; z-index: 2000; border: 1px solid #F0F0F0; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-top">OSAKA TRIP</div>
        <div class="header-title">大阪五天四夜 <span class="header-year">2026</span></div>
    </div>

    <div class="weather-scroll" id="hourlyWeather">讀取中...</div>

    <div class="date-bar">
        <div class="date-item active">TUE<br>14</div>
        <div class="date-item">WED<br>15</div>
        <div class="date-item">THU<br>16</div>
        <div class="date-item">FRI<br>17</div>
        <div class="date-item">SAT<br>18</div>
    </div>

    <div class="container">
        <div class="timeline" id="mainTimeline"></div>
    </div>

    <div class="focus-card">
        <div style="flex:1; border-right:1px solid #EEE; padding-right:15px;">
            <div style="font-family:'Noto Serif TC', serif; font-size:1.35rem;">12:00 <span style="font-size:10px; color:#999; margin-left:8px; font-weight:normal;">NEXT</span></div>
            <div style="font-size:14px; font-weight:600; margin-top:5px;">午餐：Shake Shack 漢堡</div>
        </div>
        <div style="flex:0 0 80px; text-align:center; padding-left:10px;">
            <div style="font-size:10px; color:#999;">地點</div>
            <div style="font-size:12px; font-weight:600;">大丸 1F</div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">×</span>
            <div style="font-size:10px; color:var(--accent); font-weight:700; letter-spacing:1px;" id="m-category"></div>
            <h2 id="m-title" style="font-family:'Noto Serif TC', serif; font-size:1.5rem; margin:10px 0;"></h2>
            <div class="blogger-tip" id="m-blogger-tip"></div>
            <div style="font-size:11px; color:var(--sub); border-bottom:1px solid #F0F0F0; padding-bottom:5px; margin:20px 0 12px;">導遊深度建議 (INSIDER TIPS)</div>
            <div id="m-info-grid"></div>
            <a id="m-map" href="#" class="btn-map">📍 開啟 Google Maps 導航</a>
        </div>
    </div>

    <script>
        const guideData = {
            flight: {
                category: "FLIGHT", title: "星宇航空 IT210", 
                bloggerTip: "<b>導遊叮嚀：</b>IT210 預計 10:24 抵達。如果是搭乘星宇，關西機場 T1 入境後直接左轉二樓就是南海電鐵，非常快速！",
                list: [
                    { main: "入境攻略", sub: "建議下機後快步移動，關西機場入境排隊人潮極多" },
                    { main: "VJW 截圖", sub: "記得提前準備好 Visit Japan Web 入境 QR Code" }
                ], map: ""
            },
            lunch: {
                category: "FOOD", title: "午餐：Shake Shack", 
                bloggerTip: "<b>導遊私藏：</b>除了經典漢堡，大丸店有推出大阪限定的<b>『心齋橋奶昔』</b>。如果是 6 人團，一樓座位區較擁擠，可考慮外帶去旁邊的小桌區吃，或是分兩桌坐。",
                list: [
                    { main: "ShackBurger", sub: "招牌安格斯牛肉起司堡" },
                    { main: "心齋橋限定奶昔", sub: "只有這間分店才喝得到的限定口味" }
                ], map: "https://app.goo.gl/xS7D"
            },
            shopping: {
                category: "SHOPPING", title: "大丸百貨 & PARCO 攻略", 
                bloggerTip: "<b>重要退稅陷阱：</b>大丸與 PARCO 雖然連通，但<b>退稅是分開辦理的！</b>在大丸買的要去大丸 4F，PARCO 買的則是在 PARCO 櫃位或指定櫃檯，不能合併計算喔！",
                list: [
                    { main: "Bâton d'or (大丸 B1)", sub: "台灣人瘋搶！Pocky 界的愛馬仕，必買伴手禮" },
                    { main: "WPC 傘 (PARCO 5F)", sub: "極致輕量遮陽傘，日雜模特兒人手一支" },
                    { main: "吉伊卡哇 Land (PARCO 6F)", sub: "全大阪最紅，有限購規定，建議先衝" },
                    { main: "空橋撇步", sub: "兩館 2F、7F、10F 都有連通橋，逛累了隨時換棟" }
                ], map: "https://app.goo.gl/xS7D"
            },
            hotel: {
                category: "HOTEL", title: "民宿：日居大正一号館", 
                bloggerTip: "<b>導遊在地推薦：</b>大正站出口就有<b>大國藥妝</b>（比心齋橋便宜！）。附近還有<b>『Tugboat Taisho』</b>，晚上這組貨櫃市集在河邊非常漂亮，適合姊妹喝點調酒、吃烤肉。",
                list: [
                    { main: "大正大國藥妝", sub: "就在車站出口，建議回民宿前順手補貨免排隊" },
                    { main: "Tugboat Taisho", sub: "超熱門水上貨櫃市集，拍照聖地" },
                    { main: "入住拍照", sub: "行李整齊放置玄關後拍照傳給房東確認" }
                ], map: "https://goo.gl/maps/A6p8i3vF6u65jD6b7"
            }
        };

        const timeline = [
            { time: "06:40", title: "星宇 IT210 出發", key: "flight", label: "FLIGHT" },
            { time: "12:00", title: "午餐：Shake Shack", key: "lunch", label: "FOOD" },
            { time: "14:00", title: "百貨商圈深度逛", key: "shopping", label: "SHOPPING" },
            { time: "18:00", title: "抵達大正民宿", key: "hotel", label: "ACCOMMODATION" }
        ];

        function renderTimeline() {
            document.getElementById('mainTimeline').innerHTML = timeline.map(i => `
                <div class="item" onclick="showGuide('${i.key}')">
                    <div class="item-time">${i.time}</div>
                    <div class="item-content">
                        <span class="item-label">${i.label}</span>
                        <h2 class="item-title">${i.title}</h2>
                    </div>
                </div>
            `).join('');
        }

        function showGuide(key) {
            const d = guideData[key];
            document.getElementById('m-category').innerText = d.category;
            document.getElementById('m-title').innerText = d.title;
            document.getElementById('m-blogger-tip').innerHTML = d.bloggerTip;
            document.getElementById('m-info-grid').innerHTML = d.list.map(i => `
                <div class="info-item">
                    <div class="info-main">${i.main}</div>
                    <div class="info-sub">${i.sub}</div>
                </div>
            `).join('');
            const btn = document.getElementById('m-map');
            if(d.map) { btn.href = d.map; btn.style.display = 'block'; } else { btn.style.display = 'none'; }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function fetchWeather() {
            const scroll = document.getElementById('hourlyWeather');
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&hourly=temperature_2m,weathercode&timezone=Asia%2FTokyo`);
            const data = await res.json();
            scroll.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const t = data.hourly.time[i].split('T')[1];
                const temp = Math.round(data.hourly.temperature_2m[i]);
                scroll.innerHTML += `<div class="w-item"><div style="font-size:10px; color:#999;">${t}</div><div style="font-size:1.2rem; margin:5px 0;">🌤️</div><div style="font-size:13px; font-weight:600;">${temp}°</div></div>`;
            }
        }
        renderTimeline();
        fetchWeather();
    </script>
</body>
</html>
