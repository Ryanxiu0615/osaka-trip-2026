<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 大阪五天四夜</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDFCF8; --line: #E5E2D9; --primary: #333; --accent: #C88F8F; --sub: #888; --weather-bg: rgba(244, 242, 237, 0.7); }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        .header { text-align: center; padding: 40px 20px 5px; }
        .sub-h { font-size: 10px; letter-spacing: 4px; color: var(--sub); text-transform: uppercase; }
        h1 { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; margin: 10px 0; font-weight: 600; }
        
        /* 天氣區塊 */
        .weather-card { margin: 10px 25px; padding: 15px; background: var(--weather-bg); border-radius: 16px; display: flex; align-items: center; gap: 15px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.5); animation: fadeIn 0.5s ease; }
        .weather-icon { font-size: 2rem; }
        .weather-info { flex: 1; }
        .temp { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 600; color: var(--primary); }
        .tips { font-size: 11px; color: #777; margin-top: 2px; }

        .date-bar { display: flex; justify-content: center; gap: 10px; margin: 15px 0; border-bottom: 1px solid #EEE; padding-bottom: 15px; overflow-x: auto; }
        .date-item { text-align: center; font-size: 11px; color: #BBB; cursor: pointer; min-width: 50px; }
        .date-item.active { color: var(--accent); font-weight: 600; }
        .date-item.active span { border-bottom: 2px solid var(--accent); padding-bottom: 4px; }

        .container { padding: 10px 25px 120px; }
        .timeline { position: relative; display: none; }
        .timeline.active { display: block; }
        .timeline::before { content: ''; position: absolute; left: 52px; top: 0; bottom: 0; width: 1px; background: var(--line); }

        .item { position: relative; padding-left: 75px; margin-bottom: 35px; cursor: pointer; }
        .item-time { position: absolute; left: 0; font-family: 'Noto Serif TC', serif; font-size: 1.1rem; color: var(--primary); }
        .item-time::after { content: '°'; font-size: 10px; vertical-align: super; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 600; margin: 0; line-height: 1.4; }
        .item-label { font-size: 9px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .stamp { border: 1.2px solid var(--accent); color: var(--accent); padding: 1px 5px; font-size: 9px; border-radius: 3px; transform: rotate(-8deg); display: inline-block; margin-left: 8px; font-weight: bold; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 88%; max-height: 85%; border-radius: 24px; padding: 30px; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 28px; color: #DDD; }
        .modal-body { font-size: 14px; line-height: 1.8; color: #555; white-space: pre-line; margin-top: 15px; }
        .modal-title { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; color: var(--primary); border-bottom: 1px solid #F0F0F0; padding-bottom: 15px; }
        .btn-map { display: block; background: var(--primary); color: white; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; margin-top: 25px; font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="sub-h">Travel Planner 2026</div>
        <h1>小陳旅行社 大阪五天四夜</h1>
    </div>

    <div id="weatherBox" class="weather-card">
        <div class="weather-icon" id="w-icon">🌤️</div>
        <div class="weather-info">
            <div class="temp" id="w-temp">大阪 12°C - 20°C</div>
            <div class="tips" id="w-tips">早晚溫差大，建議薄長袖加防風外套。</div>
        </div>
    </div>

    <div class="date-bar" id="dateBar">
        <div class="date-item active" onclick="showDay('day1')">4/14<br><span>(二)</span></div>
        <div class="date-item" onclick="showDay('day2')">4/15<br><span>(三)</span></div>
        <div class="date-item" onclick="showDay('day3')">4/16<br><span>(四)</span></div>
        <div class="date-item" onclick="showDay('day4')">4/17<br><span>(五)</span></div>
        <div class="date-item" onclick="showDay('day5')">4/18<br><span>(六)</span></div>
    </div>

    <div class="container" id="timelineContainer"></div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="m-title" class="modal-title"></div>
            <div id="m-body" class="modal-body"></div>
            <a id="m-map" href="#" class="btn-map" target="_blank">📍 開啟 Google Maps 導航</a>
        </div>
    </div>

    <script>
        const weatherData = {
            day1: { city: "大阪", icon: "🌤️", temp: "12°C - 20°C", tips: "第一天抵達，大阪氣候宜人，適合洋蔥式穿法。" },
            day2: { city: "大阪 (環球影城)", icon: "☀️", temp: "13°C - 22°C", tips: "影城全日，晴朗微風，記得補充水分與防曬。" },
            day3: { city: "京都", icon: "⛩️", temp: "10°C - 19°C", tips: "京都早晚較涼，建議帶件輕便圍巾或厚外套。" },
            day4: { city: "大阪 (梅田)", icon: "☁️", temp: "14°C - 21°C", tips: "多雲轉晴，逛街行程為主，室內暖氣可能稍強。" },
            day5: { city: "大阪 (機場)", icon: "🌤️", temp: "15°C - 22°C", tips: "最後一天，適合穿著舒適準備登機。" }
        };

        const itinerary = {
            day1: [
                { time: '06:40', label: 'FLIGHT', title: '出發 IT210', desc: '桃園機場 T2 (TPE) ⭢ 關西機場 T1 (KIX)\n🛫 起飛：06:40\n🛬 抵達：10:24', map: '' },
                { time: '12:00', label: 'ACCOMMODATION', title: '日居大正一号館', desc: '🚇 南海地鐵 關西機場 ⭢ 大阪環狀 (52分)\n⚠️ 行李放玄關，務必拍照回傳給房東確認。', map: 'https://goo.gl/maps/A6p8i3vF6u65jD6b7' },
                { time: '14:00', label: 'CITY WALK', title: '心齋橋市區攻略', desc: '➊ Shake Shack 漢堡 (大丸百貨 1F)\n➋ 大丸百貨：agete、寶可夢中心\n➌ PARCO：吉伊卡哇land、cosme、無印良品\n💡 兩百貨有空橋互通。', map: 'https://app.goo.gl/xS7D' },
                { time: '17:30', label: 'DINNER', title: '蔬菜串燒 Naruto ya', stamp: '予約済', desc: '已預約 17:30\nYasai Kushimaki Naruto ya Ao\n這是一家必吃的蔬菜捲串燒店！', map: 'https://app.goo.gl/zL6v7' }
            ],
            day2: [
                { time: '09:00', label: 'USJ', title: '日本環球影城', desc: '📍當天預測人數、APP下載點此 [cite: 36, 37]\n🎟️門票與快通已準備好 [cite: 38, 39]\n重點設施：\n- 咒術迴戰 Real 4-D [cite: 49, 50, 84]\n- 飛天翼龍、侏羅紀乘車遊 [cite: 85, 86]\n- 小小兵瘋狂乘車遊 (有快通) [cite: 74]', map: 'https://app.goo.gl/tU5J' },
                { time: '11:00', label: 'NINTENDO', title: '任天堂園區', stamp: '予約済', desc: '11:00-11:30 咚奇剛瘋狂礦車 [cite: 55, 56]\n- 瑪莉歐賽車~庫帕的挑戰 [cite: 54]\n- 耀西冒險 (小孩設施) [cite: 57]\n🍴 奇諾比奧咖啡 / 耀西炒麵麵包 [cite: 58, 59]\n🛍️ 必買：無敵星星爆米花桶、能量手環 [cite: 60, 61]', map: '' },
                { time: '13:00', label: 'THEME FOOD', title: '魔物獵人：賽利亞納食堂', desc: '主打「超真實貓飯」的主題餐廳 [cite: 51, 52]。\n艾路貓會出來互動拍照！', map: '' },
                { time: '15:00', label: 'HARRY POTTER', title: '哈利波特園區', desc: '- 禁忌之旅 (有快通) [cite: 63, 64]\n- 鷹馬的飛行 [cite: 65]\n🍴 必吃：三根掃帚、奶油啤酒 [cite: 66, 67]\n🛍️ 商店：蜂蜜公爵、奧利凡德魔杖店 [cite: 68]', map: '' },
                { time: '19:30', label: 'DINNER', title: '燒肉 Tokuchan 野田店', desc: '焼肉ホルモンとくちゃん野田店 [cite: 96, 97]\n🚇 影城 ⭢ 西九條 ⭢ 野田 (25分) [cite: 95]', map: 'https://app.goo.gl/97N' }
            ],
            day3: [
                { time: '11:00', label: 'LUNCH', title: '敘敘苑 JR京都伊勢丹', stamp: '予約済', desc: '已預約 11:00 [cite: 117]\n位於伊勢丹百貨 7F [cite: 116]。', map: 'https://app.goo.gl/jjo' },
                { time: '14:00', label: 'SHRINE', title: '下鴨神社 完整御守', desc: '⛩️ 必買御守 [cite: 126-133]：\n- 蕾絲御守：開運與淨化身心\n- 媛守：女性專用(變美/結緣)\n- 彥守：丹寧布製(事業)\n- 水守：透明設計(消災解厄)\n- 八咫烏除厄御守：驅散惡意\n- 相の環守：戒指造型', map: 'maps.google.com' },
                { time: '18:00', label: 'DINNER', title: '京都 かに銀 螃蟹', desc: 'Kyoto KANI-GIN Kawaramachi Store [cite: 135, 136]\n品嚐頂級螃蟹料理。', map: 'https://app.goo.gl/kng' }
            ],
            day4: [
                { time: '09:00', label: 'MARKET', title: '木津市場海鮮', desc: '大阪傳統市場 [cite: 150, 151]。', map: 'maps.google.com' },
                { time: '14:00', label: 'CAFE', title: 'LOUTRE 水獺咖啡', desc: '大阪千日前店，下午兩點營業 [cite: 155, 158]。', map: 'maps.google.com' },
                { time: '18:00', label: 'DINNER', title: '天星 (天婦羅)', desc: '⚠️ 重要規定 [cite: 164]：\n請穿半正式休閒服。禁止短褲、拖鞋、運動服、吊帶。', map: 'https://app.goo.gl/tsb' },
                { time: '20:30', label: 'RELAX', title: '空庭溫泉', desc: '營業至 23:00 [cite: 166, 167]。', map: 'https://app.goo.gl/k庭' }
            ],
            day5: [
                { time: '11:00', label: 'LUNCH', title: 'うなぎの中庄 鰻魚飯', desc: '心齋橋店 [cite: 182, 183]。', map: 'https://app.goo.gl/nak' },
                { time: '13:00', label: 'CHARTER', title: '包車前往臨空城', desc: '🚗 已預約 13:00 [cite: 186, 187]。', map: 'https://app.goo.gl/rku' },
                { time: '17:00', label: 'RETURN', title: '抵達關西機場 T1', desc: '🛫 IT213 起飛：19:00 (預計) [cite: 190, 191]。\n記得辦理退稅！', map: 'https://app.goo.gl/kix' }
            ]
        };

        function renderTimeline(dayId) {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = `<div id="${dayId}" class="timeline active"></div>`;
            const timelineDiv = container.firstChild;

            itinerary[dayId].forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.onclick = () => openModal(item.title, item.desc, item.map);
                itemDiv.innerHTML = `
                    <div class="item-time">${item.time}</div>
                    <div class="item-content">
                        <span class="item-label">${item.label}</span>
                        <h2 class="item-title">${item.title} ${item.stamp ? `<span class="stamp">${item.stamp}</span>` : ''}</h2>
                    </div>
                `;
                timelineDiv.appendChild(itemDiv);
            });

            // 更新天氣資訊
            const weather = weatherData[dayId];
            document.getElementById('w-icon').innerText = weather.icon;
            document.getElementById('w-temp').innerText = `${weather.city} ${weather.temp}`;
            document.getElementById('w-tips').innerText = weather.tips;
        }

        function showDay(dayId) {
            renderTimeline(dayId);
            document.querySelectorAll('.date-item').forEach(d => d.classList.remove('active'));
            event.currentTarget.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openModal(title, body, mapUrl) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-body').innerText = body;
            const btn = document.getElementById('m-map');
            if(mapUrl) { btn.href = mapUrl; btn.style.display = 'block'; } else { btn.style.display = 'none'; }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        renderTimeline('day1');
    </script>
</body>
</html>
