<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陳旅行社 · Day 1 測試</title>
    <link rel="manifest" href="manifest.json">

    <style>
        :root { --bg: #FDFCF8; --line: #E5E2D9; --primary: #333; --accent: #C88F8F; --sub: #888; --ticket-bg: #FCFBF7; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; color: var(--primary); -webkit-font-smoothing: antialiased; }
        
        /* Header */
        .header { text-align: center; padding: 40px 20px 0; }
        .sub-h { font-size: 10px; letter-spacing: 4px; color: var(--sub); text-transform: uppercase; }
        h1 { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; margin: 10px 0; font-weight: 600; }
        
        /* Apple Style Weather Scroll */
        .weather-section { margin: 10px 20px 20px; padding: 15px; background: rgba(244, 242, 237, 0.5); border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); }
        .weather-title { font-size: 11px; color: var(--sub); margin-bottom: 12px; display: flex; justify-content: space-between; }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 10px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hour-item { text-align: center; min-width: 45px; flex-shrink: 0; }
        .hour-time { font-size: 11px; color: var(--sub); margin-bottom: 8px; }
        .hour-icon { font-size: 1.5rem; margin-bottom: 8px; }
        .hour-temp { font-size: 14px; font-weight: 600; }

        /* Date Bar */
        .date-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #EEE; padding-bottom: 15px; }
        .date-item { text-align: center; font-size: 11px; color: #BBB; min-width: 50px; }
        .date-item.active { color: var(--accent); font-weight: 600; }
        .date-item.active span { border-bottom: 2px solid var(--accent); padding-bottom: 4px; }

        /* Timeline Container */
        .container { padding: 0 25px 120px; }
        .timeline { position: relative; border-left: 1px solid var(--line); margin-left: 55px; padding-left: 25px; }
        
        /* Timeline Items */
        .item { position: relative; margin-bottom: 40px; cursor: pointer; }
        .item-time { position: absolute; left: -80px; font-family: 'Noto Serif TC', serif; font-size: 1.1rem; color: var(--primary); width: 50px; text-align: right; }
        .item-time::after { content: '°'; font-size: 10px; vertical-align: super; }
        .item-label { font-size: 9px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .item-title { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 600; margin: 0; line-height: 1.3; }
        .stamp { border: 1.2px solid var(--accent); color: var(--accent); padding: 1px 5px; font-size: 9px; border-radius: 3px; transform: rotate(-8deg); display: inline-block; margin-left: 8px; font-weight: bold; }
        
        /* Shopping Chips */
        .shop-chip { display: inline-block; padding: 2px 8px; background: #F0F0F0; border-radius: 4px; font-size: 10px; color: #777; margin-top: 6px; margin-right: 4px; font-weight: 500; }

        /* Modal (Bottom Sheet Style) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; max-height: 85%; border-radius: 24px 24px 0 0; padding: 35px 25px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #CCC; }
